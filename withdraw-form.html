<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Withdrawal Form - XToken Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-animated"></div>
  <canvas id="particle-canvas"></canvas>
  
  <div class="container page-transition">
    <a href="withdraw-options.html" class="back-btn">←</a>
    
    <div class="form-header">
      <h2 class="form-title">Withdrawal Details</h2>
      <p class="form-subtitle">Enter amount and destination</p>
    </div>
    
    <form id="withdraw-form">
      <!-- Amount Input -->
      <div class="amount-input-wrapper">
        <input type="number" id="amount" class="amount-input" placeholder="0.00" step="0.01" min="1" required>
        <span class="amount-currency">USD</span>
      </div>
      
      <div class="conversion-display" id="conversion-display">
        ≈ <span class="highlight">0.00000000 BNB</span> at current rate
      </div>
      
      <!-- Conditional Fields -->
      <div id="cashapp-field" class="conditional-field">
        <div class="input-group">
          <input type="text" name="cashapp" class="input-field" placeholder=" " pattern="\$[A-Za-z0-9]+">
          <label class="input-label">Cash App $Cashtag</label>
          <div class="field-hint">Format: $example</div>
        </div>
      </div>
      
      <div id="paypal-field" class="conditional-field">
        <div class="input-group">
          <input type="email" name="paypal" class="input-field" placeholder=" ">
          <label class="input-label">PayPal Email</label>
          <div class="field-hint">example@email.com</div>
        </div>
      </div>
      
      <div id="bank-fields" class="conditional-field">
        <div class="input-group">
          <input type="text" name="account_holder" class="input-field" placeholder=" ">
          <label class="input-label">Account Holder Name</label>
        </div>
        
        <div class="input-group">
          <input type="text" name="account_number" class="input-field" placeholder=" ">
          <label class="input-label">Account Number</label>
        </div>
        
        <div class="input-group">
          <input type="text" name="routing" class="input-field" placeholder=" ">
          <label class="input-label">Routing Number</label>
        </div>
        
        <div class="input-group">
          <input type="text" name="bank_name" class="input-field" placeholder=" ">
          <label class="input-label">Bank Name</label>
        </div>
      </div>
      
      <div id="wallet-field" class="conditional-field">
        <div class="input-group">
          <input type="text" name="wallet_address" class="input-field" placeholder=" ">
          <label class="input-label">Wallet Address</label>
          <div class="field-hint">BSC, ETH, or BTC address</div>
        </div>
      </div>
      
      <button type="submit" class="btn btn-glow w-full" style="margin-top: 1rem;">
        Continue
        <span>→</span>
      </button>
    </form>
  </div>
  
  <script src="shared.js"></script>
</body>
</html>
