<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XToken Pro - Secure Crypto Wallet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-animated"></div>
  <canvas id="particle-canvas"></canvas>
  
  <div class="login-container page-transition">
    <div class="login-logo">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
      </svg>
    </div>
    
    <div class="glass-card login-card">
      <h1 class="login-title">Welcome to XToken</h1>
      <p class="login-subtitle">The future of multi-chain asset management</p>
      
      <div class="trust-badges">
        <div class="trust-badge">
          <span>👥</span>
          <span>30M+ Users</span>
        </div>
        <div class="trust-badge">
          <span>🔒</span>
          <span>Multi-Chain Secure</span>
        </div>
        <div class="trust-badge">
          <span>👆</span>
          <span>Biometric Protected</span>
        </div>
      </div>
      
      <form id="login-form" class="mt-3">
        <div class="input-group">
          <input type="text" id="username" class="input-field" placeholder=" " required autocomplete="off">
          <label class="input-label" for="username">Username</label>
        </div>
        
        <div class="input-group">
          <input type="password" id="password" class="input-field" placeholder=" " required>
          <label class="input-label" for="password">Password</label>
        </div>
        
        <div id="error-msg" class="hidden" style="color: var(--neon-red); margin-bottom: 1rem; font-size: 0.875rem;"></div>
        
        <button type="submit" class="btn btn-glow w-full">
          <span>🔐</span>
          <span>Secure Login</span>
        </button>
      </form>
      
      <p style="margin-top: 1.5rem; font-size: 0.875rem; color: rgba(255,255,255,0.5);">
        Protected by military-grade encryption
      </p>
    </div>
  </div>
  
  <script src="shared.js"></script>
</body>
</html>
